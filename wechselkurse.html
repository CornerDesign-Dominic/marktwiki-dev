<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wechselkurse | MarktWiki</title>
  <meta name="description" content="Uebersicht zentral gepflegter Wechselkurse mit Basiswaehrung EUR oder USD und Sortierfunktion.">
  <link rel="stylesheet" href="./style.css">
  <script src="./layout.js"></script>
  <script src="./main.js" defer></script>
</head>
<body data-page="exchange-rates" data-base-path="." data-nav="exchange-rates">
  <script>window.MarktWikiLayout.injectHeader();</script>

  <main>
    <div class="container">
      <h1 class="exchange-rates-page-title">Wechselkurse</h1>

      <section class="card section-space exchange-rates-controls" aria-labelledby="exchange-rates-controls-heading">
        <h2 id="exchange-rates-controls-heading" class="sr-only">Wechselkurse filtern und sortieren</h2>
        <div class="exchange-rates-controls-grid">
          <div class="field">
            <label for="exchange-base-currency">Anzeige relativ zu</label>
            <select id="exchange-base-currency" aria-label="Basiswaehrung auswaehlen">
              <option value="EUR">EUR</option>
              <option value="USD">USD</option>
            </select>
          </div>
          <div class="field">
            <label for="exchange-sort-direction">Sortierung nach Wechselkurswert</label>
            <select id="exchange-sort-direction" aria-label="Sortierung nach Wechselkurswert">
              <option value="asc">Aufsteigend</option>
              <option value="desc">Absteigend</option>
            </select>
          </div>
        </div>
        <p id="exchange-rates-meta" class="muted exchange-rates-meta" role="status" aria-live="polite"></p>
      </section>

      <section class="card section-space exchange-converter" aria-labelledby="exchange-converter-heading">
        <h2 id="exchange-converter-heading">Wechselkurs-Rechner</h2>
        <div class="exchange-converter-grid">
          <div class="field exchange-converter-side">
            <label for="exchange-converter-amount-left">Betrag links</label>
            <input id="exchange-converter-amount-left" type="number" inputmode="decimal" step="any" value="1" aria-label="Betrag links eingeben">
            <label for="exchange-converter-from-search">Waehrung links suchen</label>
            <input id="exchange-converter-from-search" type="search" placeholder="Code oder Name suchen" aria-label="Linke Waehrung suchen">
            <label for="exchange-converter-from">Waehrung links</label>
            <select id="exchange-converter-from" aria-label="Linke Waehrung auswaehlen"></select>
          </div>

          <div class="field exchange-converter-side">
            <label for="exchange-converter-amount-right">Betrag rechts</label>
            <input id="exchange-converter-amount-right" type="number" inputmode="decimal" step="any" value="" aria-label="Betrag rechts eingeben">
            <label for="exchange-converter-to-search">Waehrung rechts suchen</label>
            <input id="exchange-converter-to-search" type="search" placeholder="Code oder Name suchen" aria-label="Rechte Waehrung suchen">
            <label for="exchange-converter-to">Waehrung rechts</label>
            <select id="exchange-converter-to" aria-label="Rechte Waehrung auswaehlen"></select>
          </div>
        </div>

        <div class="exchange-converter-result" role="status" aria-live="polite">
          <p id="exchange-converter-output" class="exchange-converter-output">1,00 EUR = 1,00 USD</p>
          <p id="exchange-converter-rate" class="muted exchange-converter-rate"></p>
        </div>

        <p class="muted exchange-converter-disclaimer">
          Haftungsausschluss: Die angezeigten Wechselkurse dienen nur zur Orientierung. Keine Gewaehr fuer Aktualitaet, Richtigkeit oder Vollstaendigkeit.
        </p>
      </section>

      <section class="section-space" aria-labelledby="exchange-rates-list-heading">
        <h2 id="exchange-rates-list-heading" class="sr-only">Wechselkursliste</h2>
        <div id="exchange-rates-list" class="card-grid exchange-rates-grid" data-error-target="exchange-rates">
          <p class="status-message">Wechselkurse werden geladen ...</p>
        </div>
      </section>
    </div>
  </main>

  <script>window.MarktWikiLayout.injectFooter();</script>
</body>
</html>

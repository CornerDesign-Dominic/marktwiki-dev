<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wiki | MarktWiki</title>
  <meta name="description" content="Artikelbasiertes Wirtschafts-Wiki im MarktWiki.">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/wiki-overview.js" defer></script>
</head>
<body data-base-path=".." data-nav="wiki">
  <script>window.MarktWikiLayout.injectHeader();</script>
  <main>
    <div class="container">
      <section class="page-head-compact" aria-label="Seitenkopf">
        <a class="back-link" href="../index.html">&larr; Zur Startseite</a>
      </section>

      <div class="article-with-toc wiki-overview-layout">
        <section class="article-toc wiki-overview-toc" aria-label="Inhaltsnavigation">
          <h3>Inhalt</h3>
          <ul data-wiki-toc-list>
            <li><span class="muted">Wiki-Uebersicht wird geladen...</span></li>
          </ul>
        </section>

        <section class="section-space wiki-overview-shell" aria-labelledby="wiki-overview-heading">
          <div class="section-head wiki-overview-head">
            <h1 id="wiki-overview-heading">Wiki</h1>
            <button type="button" class="btn wiki-overview-collapse" data-collapse-all>Alle einklappen</button>
          </div>

          <div class="wiki-tree" data-wiki-tree aria-live="polite">
            <p class="muted">Wiki-Uebersicht wird geladen...</p>
          </div>
        </section>
      </div>
    </div>
  </main>

  <button type="button" class="wiki-back-to-top" data-back-to-top aria-label="Nach oben scrollen" title="Nach oben">
    <span class="wiki-back-to-top-icon" aria-hidden="true"></span>
  </button>

  <script>window.MarktWikiLayout.injectFooter();</script>
</body>
</html>

<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Boersennotierte Unternehmen | MarktWiki</title>
  <meta name="description" content="Uebersicht boersennotierter Unternehmen mit kompakten Eckdaten, Filtern und direktem Zugang zur Detailseite.">
  <link rel="stylesheet" href="./style.css">
  <script src="./layout.js"></script>
  <script src="./main.js" defer></script>
</head>
<body data-page="stocks" data-base-path="." data-nav="listed-companies">
  <script>window.MarktWikiLayout.injectHeader();</script>

  <main>
    <div class="container">
      <section class="card hero">
        <h1>Boersennotierte Unternehmen</h1>
      </section>

      <section class="card section-space stocks-controls" aria-labelledby="stocks-controls-heading">
        <h2 id="stocks-controls-heading" class="sr-only">Unternehmen suchen und filtern</h2>
        <div class="stocks-controls-grid">
          <div class="field">
            <label for="stocks-search">Unternehmen suchen</label>
            <input id="stocks-search" type="search" placeholder="Name, Symbol, CEO, Sektor, Branche, Land ..." autocomplete="off" spellcheck="false">
          </div>
          <div class="field">
            <label for="stocks-country-filter">Land</label>
            <select id="stocks-country-filter" aria-label="Nach Land filtern"></select>
          </div>
          <div class="field">
            <label for="stocks-currency-filter">Waehrung</label>
            <select id="stocks-currency-filter" aria-label="Nach Waehrung filtern"></select>
          </div>
          <div class="field">
            <label for="stocks-display-currency">Anzeigewaehrung</label>
            <select id="stocks-display-currency" aria-label="Anzeigewaehrung auswaehlen">
              <option value="EUR">EUR</option>
              <option value="USD">USD</option>
            </select>
          </div>
          <div class="field">
            <label for="stocks-sector-filter">Sektor</label>
            <select id="stocks-sector-filter" aria-label="Nach Sektor filtern"></select>
          </div>
          <div class="field">
            <label for="stocks-industry-filter">Branche</label>
            <select id="stocks-industry-filter" aria-label="Nach Branche filtern"></select>
          </div>
          <div class="field">
            <label for="stocks-exchange-filter">Boerse</label>
            <select id="stocks-exchange-filter" aria-label="Nach Boerse filtern"></select>
          </div>
          <div class="field">
            <label for="stocks-sort">Sortierfeld</label>
            <select id="stocks-sort" aria-label="Unternehmen sortieren">
              <option value="marketCap" selected>Marktkapitalisierung</option>
              <option value="name">Name</option>
              <option value="price">Aktienkurs</option>
              <option value="country">Land</option>
              <option value="sector">Sektor</option>
            </select>
          </div>
          <div class="field">
            <label for="stocks-sort-direction">Richtung</label>
            <select id="stocks-sort-direction" aria-label="Sortierrichtung">
              <option value="desc" selected>Absteigend</option>
              <option value="asc">Aufsteigend</option>
            </select>
          </div>
          <div class="field">
            <label for="stocks-reset-filters">Filter</label>
            <button id="stocks-reset-filters" class="btn" type="button">Zuruecksetzen</button>
          </div>
        </div>
        <p id="stocks-results-count" class="muted stocks-results-count" role="status" aria-live="polite"></p>
      </section>

      <section class="section-space" aria-labelledby="favorites-heading">
        <div class="watchlist-heading-wrap">
          <h2 id="favorites-heading">Meine Beobachtungsliste</h2>
        </div>
        <div id="stocks-favorites-list" class="card-grid stock-grid" data-error-target="stocks-favorites">
          <p class="status-message">Favoriten werden geladen ...</p>
        </div>
      </section>

      <section class="section-space" aria-labelledby="stocks-heading">
        <h2 id="stocks-heading" class="sr-only">Unternehmens-Uebersicht</h2>
        <div id="stocks-list" class="card-grid stock-grid" data-error-target="stocks">
          <p class="status-message">Unternehmen werden geladen ...</p>
        </div>
      </section>
    </div>
  </main>

  <script>window.MarktWikiLayout.injectFooter();</script>
</body>
</html>

<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kurse | MarktWiki</title>
  <meta name="description" content="Kompakte Kursuebersicht fuer Aktien, ETFs, Indizes, Krypto, Waehrungen und Rohstoffe in einem reinen Kursbereich ohne Einzelwert-Detailseiten.">
  <link rel="stylesheet" href="./style.css">
  <script src="./layout.js"></script>
  <script src="./kurse.js" defer></script>
</head>
<body data-base-path="." data-nav="quotes-home">
  <script>window.MarktWikiLayout.injectHeader();</script>

  <main>
    <div class="container">
      <header class="hero">
        <h1>Kurse</h1>
      </header>

      <section class="card quotes-display-card" aria-labelledby="quotes-display-heading">
        <div class="quotes-display-card-row">
          <div class="quotes-display-copy">
            <h2 id="quotes-display-heading">Anzeigewaehrung</h2>
            <p>Originalwaehrung als Standard, USD und EUR fuer Vergleichsansichten.</p>
          </div>
          <div class="quotes-currency-toggle" role="group" aria-label="Anzeigewaehrung waehlen">
            <button type="button" class="quotes-currency-button" data-display-currency="ORIGINAL" aria-pressed="false">Originalwaehrung</button>
            <button type="button" class="quotes-currency-button" data-display-currency="USD" aria-pressed="false">USD</button>
            <button type="button" class="quotes-currency-button" data-display-currency="EUR" aria-pressed="false">EUR</button>
          </div>
        </div>
      </section>

      <section class="section-space" aria-labelledby="quotes-overview-heading">
        <h2 id="quotes-overview-heading" class="sr-only">Kurskategorien</h2>
        <div id="quotes-overview" class="card-grid quotes-overview-grid">
          <p class="status-message">Kurskategorien werden geladen ...</p>
        </div>
      </section>
    </div>
  </main>

  <script>window.MarktWikiLayout.injectFooter();</script>
</body>
</html>

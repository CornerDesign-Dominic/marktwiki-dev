name: Update daily stock EOD data

on:
  schedule:
    # GitHub Actions cron runs in UTC.
    # We trigger every 10 minutes during the two UTC hours that can map to
    # 16:20 in New York, then gate the real work with an America/New_York check.
    - cron: "*/10 20-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  EOD_SOURCE_FILE: data/eod_stocks_latest.json
  # Massive grouped daily aggregates endpoint.
  # API-Endpunkt hier anpassen. Platzhalter:
  # - {date} fuer das Handelsdatum
  # - {API_KEY} fuer das GitHub Secret MASSIVE_API_KEY
  EOD_API_URL: "https://api.massive.com/v2/aggs/grouped/locale/us/market/stocks/{date}?adjusted=true&apiKey={API_KEY}"
  # Optionales Handelsdatum. Leer = gestern in UTC.
  EOD_TRADING_DATE: ""
  EOD_OUTPUT_PATH: data/eod_stocks_latest.json

jobs:
  update-daily-stock-eod:
    runs-on: ubuntu-latest

    steps:
      - name: Check scheduled run time in New York
        id: market_time
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Allow manual runs at any time. The time gate only protects the schedule trigger.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch detected, skipping time gate."
            exit 0
          fi

          # Resolve the current local exchange time in America/New_York so DST
          # changes are handled by the runner's timezone database automatically.
          current_hour=$(TZ="America/New_York" date +%H)
          current_minute=$(TZ="America/New_York" date +%M)
          current_time="${current_hour}:${current_minute}"

          echo "Current America/New_York time: ${current_time}"

          # Run the EOD workflow only at exactly 16:20 New York time.
          if [ "$current_hour" = "16" ] && [ "$current_minute" = "20" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Matched 16:20 America/New_York. Continuing EOD update."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Not 16:20 America/New_York. Skipping scheduled EOD update."
          fi

      - name: Check out repository
        if: steps.market_time.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.market_time.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch stock EOD file
        if: steps.market_time.outputs.should_run == 'true'
        env:
          EOD_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: node scripts/fetch-eod-stock-data.mjs

      - name: Process matched stock EOD data
        if: steps.market_time.outputs.should_run == 'true'
        run: node scripts/process-eod-stock-data.mjs "$EOD_SOURCE_FILE"

      - name: Check for data changes
        if: steps.market_time.outputs.should_run == 'true'
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- "$EOD_SOURCE_FILE" data/company-market-data.json data/quotes/aktien.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated stock EOD data
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$EOD_SOURCE_FILE" data/company-market-data.json data/quotes/aktien.json
          git commit -m "chore: update daily stock eod data"

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: git push

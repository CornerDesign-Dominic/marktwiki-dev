name: Update ECB exchange rates

on:
  schedule:
    # 17:15 UTC entspricht ca. 18:15 CET bzw. 19:15 CEST und liegt damit sicher nach der ueblichen ECB-Veroeffentlichung.
    - cron: "15 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ecb-exchange-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update exchange rates from ECB
        run: node scripts/update-ecb-exchange-rates.mjs

      - name: Check for data changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- data/exchange-rates.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated exchange rates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/exchange-rates.json
          git commit -m "chore: update ECB exchange rates"

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: git push
